<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}AurumX</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Open Graph / Twitter for share previews -->
  <meta property="og:title" content="{{ page.title | default: 'AurumX' }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
</head>
<body>
  <div class="halo" aria-hidden="true"></div>

  <header class="brand">
    <a href="{{ '/' | relative_url }}" class="brand-link">
      <span class="brand-mark">AURUMX</span>
      <span class="brand-rule"></span>
    </a>
  </header>

  <main class="page">
    {{ content }}
  </main>

  <footer class="foot">
    <div class="foot-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/privacy' | relative_url }}">Privacy</a>
      <a href="{{ '/terms' | relative_url }}">Terms</a>
      <a href="{{ '/responsible-play' | relative_url }}">Responsible Play</a>
      <a href="{{ '/licenses' | relative_url }}">Licenses</a>
    </div>
    <div class="foot-mark">
      <span class="foot-glyph">✦</span>
      AurumX — Real metal, real wins.
    </div>
    <div class="foot-contact">
      <a href="mailto:support@aurumxgold.app">support@aurumxgold.app</a>
    </div>
  </footer>
</body>
</html>
