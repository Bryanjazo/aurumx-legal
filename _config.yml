# Jekyll config for GitHub Pages hosting of the four legal pages.
# Treat this directory as a standalone site under aurumxgold.app.
#
# Once the domain is registered:
#   1. Push the `legal/` directory to a public GitHub repo (or
#      configure this repo for Pages from /legal).
#   2. Repo Settings → Pages → set source to this directory.
#   3. Add a CNAME record at your registrar: aurumxgold.app → <user>.github.io
#   4. In Repo Settings → Pages → Custom domain, set "aurumxgold.app".
#   5. Wait ~5 minutes for the Let's Encrypt cert to issue.

title: AurumX
description: AurumX legal — privacy, terms, responsible play, licenses.
url: https://aurumxgold.app

# Custom layout in _layouts/default.html — warm-black background,
# gold accents, Cormorant serif headlines, Inter body. Mirrors the
# iOS app's visual language so users tapping "Privacy Policy" land
# somewhere that feels like the same brand.
#
# Don't set `theme:` here — that pulls in minima's CSS which would
# fight ours. The custom layout + SCSS handles everything.

# Pretty URLs: privacy.md → /privacy (no .html extension)
permalink: /:title

# Apply our custom layout to every page/post by default so we don't
# have to put `layout: default` in the front matter of every .md.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Plugins GitHub Pages supports without extra setup.
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Markdown engine
markdown: kramdown
kramdown:
  input: GFM

# Don't try to build the rest of the AurumX repo as a Jekyll site
# (only relevant when serving from a subdirectory of a bigger repo).
exclude:
  - "**/*.tsx"
  - "**/*.ts"
  - "**/*.json"
  - node_modules
  - app
  - components
  - lib
  - supabase
  - scripts
